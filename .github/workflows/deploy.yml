# 1. Name of the automated assembly line
name: Build and Deploy Portfolio API

# 2. The Trigger: Run this pipeline automatically EVERY time code is pushed to the main branch
on:
  push:
    branches: [ main ]

# 3. The Jobs (The major phases of our factory line)
jobs:
  test_and_verify:
    # Tell GitHub to spin up a fresh, temporary cloud server running Ubuntu Linux
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your repository code onto this cloud virtual machine
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step B: Install the exact Node.js runtime version required
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-node-version: 20
          cache: 'npm'

      # Step C: Install clean dependencies matching package-lock exactly
      - name: Install Dependencies
        run: npm ci

  # Note: The deployment phase kicks off automatically ONLY if your tests above pass perfectly
  deploy_to_production:
    runs-on: ubuntu-latest
    needs: test_and_verify # Gatekeeper: Don't deploy if tests fail!

    steps:
      - name: Trigger Cloud Deployment Webhook
        # This securely pings your cloud server to pull your fresh code and build the Docker container
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}"